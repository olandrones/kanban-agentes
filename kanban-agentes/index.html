<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="60" />
<title>🤖 Kanban dos Agentes</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1a1f26;
    --border: #232a32;
    --text: #e6e8eb;
    --muted: #8a94a0;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --orange: #fb923c;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  header {
    max-width: 1400px;
    margin: 0 auto 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 { font-size: 22px; font-weight: 600; }
  h2 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .meta { color: var(--muted); font-size: 13px; font-family: ui-monospace, "Cascadia Code", monospace; }
  button, .btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover, .btn:hover { background: #222a33; }
  .board, .tasks {
    max-width: 1400px;
    margin: 0 auto;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color .2s;
  }
  .card:hover { border-color: #3a4452; }
  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .emoji { font-size: 24px; }
  .name { font-weight: 600; font-size: 15px; flex: 1; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .b-green { background: rgba(34,197,94,.15); color: var(--green); }
  .b-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
  .b-red { background: rgba(239,68,68,.15); color: var(--red); }
  .b-blue { background: rgba(59,130,246,.15); color: var(--blue); }
  .b-gray { background: rgba(107,114,128,.15); color: var(--gray); }
  .row { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; }
  .label { color: var(--muted); min-width: 80px; flex-shrink: 0; }
  .value { color: var(--text); flex: 1; }
  .freq { color: var(--orange); font-family: ui-monospace, monospace; font-size: 12px; }
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .stat {
    background: var(--panel-2);
    padding: 8px 10px;
    border-radius: 6px;
    text-align: center;
  }
  .stat-num { font-size: 18px; font-weight: 600; color: var(--blue); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .progress {
    height: 4px;
    background: var(--panel-2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress > div { height: 100%; background: var(--blue); transition: width .3s; }
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    background: var(--panel-2);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .link:hover { color: var(--blue); }

  /* Tasks table */
  .tasks-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 12px;
  }
  .tasks-bar input[type="search"] {
    flex: 1;
    min-width: 200px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
  }
  .tasks-bar input[type="search"]:focus { outline: none; border-color: var(--blue); }
  .tasks-bar select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .table-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 12px 14px;
    background: var(--panel-2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th .arrow { color: var(--blue); margin-left: 4px; }
  tbody td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(255,255,255,.02); }
  tbody tr:last-child td { border-bottom: none; }
  .agente-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .agente-cell .ag-emoji { font-size: 16px; }
  .task-name { font-weight: 500; color: var(--text); }
  .task-desc { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .ts { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .col-status { white-space: nowrap; }
  .col-action { white-space: nowrap; }
  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    margin-right: 4px;
  }
  .action-btn:hover { color: var(--blue); border-color: var(--blue); }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  footer {
    max-width: 1400px;
    margin: 24px auto 0;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--muted); text-decoration: underline; }
  .legend {
    display: inline-flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-left: 12px;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🤖 Kanban dos Agentes</h1>
    <div class="meta" id="meta">— carregando —</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <span class="legend">
      <span class="legend-item"><span class="dot" style="background:var(--green)"></span> ativo</span>
      <span class="legend-item"><span class="dot" style="background:var(--yellow)"></span> em curso</span>
      <span class="legend-item"><span class="dot" style="background:var(--red)"></span> bloqueado</span>
      <span class="legend-item"><span class="dot" style="background:var(--gray)"></span> desabilitado / hold</span>
      <span class="legend-item"><span class="dot" style="background:var(--blue)"></span> sempre on</span>
    </span>
    <button onclick="render()">↻ Atualizar</button>
  </div>
</header>

<div class="board" id="board"></div>

<section class="tasks">
  <h2>📋 Tarefas em curso</h2>
  <div class="tasks-bar">
    <input type="search" id="searchInput" placeholder="🔍 buscar tarefa, agente, categoria…" />
    <select id="filterAgente">
      <option value="">todos os agentes</option>
      <option value="lyriane">✨ Lyriane</option>
      <option value="manutencao">🔧 Manutenção</option>
      <option value="heartbeat">💓 Heartbeat</option>
      <option value="pesquisa">🔍 Pesquisa</option>
      <option value="coaching">🪞 Coaching</option>
      <option value="productman">🧭 ProductMan</option>
    </select>
    <select id="filterStatus">
      <option value="">todos os status</option>
      <option value="running">▶️ rodando</option>
      <option value="done">✅ feito</option>
      <option value="blocked">⏸️ bloqueado</option>
      <option value="idle">💤 aguardando</option>
      <option value="hold">⏸️ hold</option>
    </select>
    <select id="filterPrioridade">
      <option value="">todas prioridades</option>
      <option value="P0">P0</option>
      <option value="P1">P1</option>
      <option value="P2">P2</option>
      <option value="P3">P3</option>
    </select>
  </div>
  <div class="table-wrap">
    <table id="tasksTable">
      <thead>
        <tr>
          <th data-sort="agente">Agente <span class="arrow"></span></th>
          <th data-sort="tarefa">Tarefa <span class="arrow"></span></th>
          <th data-sort="status">Status <span class="arrow"></span></th>
          <th data-sort="prioridade">Prioridade <span class="arrow"></span></th>
          <th data-sort="ultima">Última ação <span class="arrow"></span></th>
          <th data-sort="proxima">Próxima <span class="arrow"></span></th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tasksBody"></tbody>
    </table>
  </div>
</section>

<footer>
  Atualizado diariamente pelo <strong>agente-manutenção</strong> · Fonte: <code>E:\00 - Hermes System\agentes\*.md</code> · <a href="https://github.com/olandrones/kanban-agentes">ver código</a>
</footer>

let sortKey = 'agente';
let sortDir = 1;

function render() {
  const now = new Date();
  const tz = now.toLocaleString('pt-BR', { timeZone: 'America/Manaus' });
  document.getElementById('meta').textContent = 'Manaus: ' + tz;

  document.getElementById('board').innerHTML = AGENTS.map(a => `
    <div class="card">
      <div class="card-head">
        <span class="emoji">${a.emoji}</span>
        <div style="flex:1">
          <div class="name">${a.name}</div>
          <div class="meta" style="font-size:11px;margin-top:2px">${a.role}</div>
        </div>
        <span class="badge b-${a.status}">${a.badge}</span>
      </div>
      <div>
        <div class="row"><div class="label">freq</div><div class="value freq">${a.freq}</div></div>
        <div class="row"><div class="label">agora</div><div class="value">${a.currentTask}</div></div>
        <div class="row"><div class="label">última</div><div class="value">${a.last}</div></div>
        <div class="row"><div class="label">próxima</div><div class="value">${a.next}</div></div>
      </div>
      <div class="stat-row">${a.stats.map(s => `<div class="stat"><div class="stat-num">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('')}</div>
      <div class="progress"><div style="width:${a.progress}%"></div></div>
      <div class="links">${a.links.map(l => `<a class="link" href="${l.href}" target="_blank">${l.label}</a>`).join('')}</div>
    </div>
  `).join('');

  renderTasks();
}

function statusBadge(s) {
  const map = {
    running: ['▶️ rodando', 'b-yellow'],
    done:    ['✅ feito', 'b-green'],
    blocked: ['⏸️ bloqueado', 'b-red'],
    idle:    ['💤 aguardando', 'b-blue'],
    hold:    ['⏸️ hold', 'b-gray'],
  };
  const [label, cls] = map[s] || ['?', 'b-blue'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function getFilteredTasks() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const ag = document.getElementById('filterAgente').value;
  const st = document.getElementById('filterStatus').value;
  const pr = document.getElementById('filterPrioridade').value;
  return TASKS
    .filter(t => !ag || t.agente === ag)
    .filter(t => !st || t.status === st)
    .filter(t => !pr || t.prioridade === pr)
    .filter(t => !q || (t.tarefa + ' ' + t.desc + ' ' + t.ag_nome).toLowerCase().includes(q))
    .sort((a, b) => {
      const va = (a[sortKey] || '').toString().toLowerCase();
      const vb = (b[sortKey] || '').toString().toLowerCase();
      if (va < vb) return -1 * sortDir;
      if (va > vb) return 1 * sortDir;
      return 0;
    });
}

function renderTasks() {
  const tasks = getFilteredTasks();
  const body = document.getElementById('tasksBody');
  if (!tasks.length) {
    body.innerHTML = `<tr><td colspan="7" class="empty">Nenhuma tarefa bate com os filtros.</td></tr>`;
    return;
  }
  body.innerHTML = tasks.map(t => `
    <tr data-id="${t.id}">
      <td>
        <div class="agente-cell">
          <span class="ag-emoji">${t.ag_emoji}</span>
          <span>${t.ag_nome}</span>
        </div>
      </td>
      <td>
        <div class="task-name">${t.tarefa}</div>
        <div class="task-desc">${t.desc}</div>
      </td>
      <td class="col-status">${statusBadge(t.status)}</td>
      <td>${t.prioridade}</td>
      <td class="ts">${t.ultima}</td>
      <td class="ts">${t.proxima}</td>
      <td class="col-action">
        <button class="action-btn" onclick="askTask('${t.id}')">💬 perguntar</button>
        <button class="action-btn" onclick="pauseTask('${t.id}')">⏸</button>
      </td>
    </tr>
  `).join('');
}

function askTask(id) {
  const t = TASKS.find(x => x.id === id);
  if (!t) return;
  // Em produção: abre Telegram deep-link com a Lyriane
  const msg = encodeURIComponent(`Lyriane, sobre a tarefa "${t.tarefa}" do ${t.ag_nome} (${t.prioridade}): `);
  window.open(`https://t.me/LyrianeBot?text=${msg}`, '_blank');
}

function pauseTask(id) {
  const t = TASKS.find(x => x.id === id);
  if (!t) return;
  if (t.status === 'blocked') {
    alert(`"${t.tarefa}" já está bloqueada. Para desbloquear, é necessário resolver a causa raiz (veja descrição).`);
    return;
  }
  if (confirm(`Pausar "${t.tarefa}"? (em produção, isso marca a tarefa como idle e notifica o agente responsável)`)) {
    t.status = 'idle';
    renderTasks();
  }
}

// Bind filters
['searchInput','filterAgente','filterStatus','filterPrioridade'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderTasks);
  document.getElementById(id).addEventListener('change', renderTasks);
});

// Bind sort
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortDir *= -1;
    else { sortKey = k; sortDir = 1; }
    document.querySelectorAll('thead th .arrow').forEach(a => a.textContent = '');
    th.querySelector('.arrow').textContent = sortDir === 1 ? '↑' : '↓';
    renderTasks();
  });
});

render();
</script>
</body>
</html>
