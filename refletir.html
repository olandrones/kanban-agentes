<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🪞 Mural de Reflexão</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1a1f26;
    --border: #232a32;
    --text: #e6e8eb;
    --muted: #8a94a0;
    --blue: #3b82f6;
    --purple: #a855f7;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    line-height: 1.5;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  .back {
    display: inline-block;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    margin-bottom: 12px;
  }
  .back:hover { color: var(--blue); }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; }

  /* Hero da pergunta do dia */
  .pergunta {
    background: linear-gradient(135deg, #14181d 0%, #1a1f26 100%);
    border: 1px solid var(--border);
    border-left: 4px solid var(--purple);
    border-radius: 12px;
    padding: 24px;
    margin: 24px 0;
  }
  .pergunta-categoria {
    display: inline-block;
    font-size: 10px;
    color: var(--purple);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .pergunta-texto {
    font-size: 19px;
    line-height: 1.5;
    font-weight: 500;
    color: var(--text);
  }
  .pergunta-data {
    color: var(--muted);
    font-size: 11px;
    margin-top: 12px;
  }

  /* Textarea de resposta */
  .resposta-wrap { margin: 24px 0; }
  .resposta-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .resposta {
    width: 100%;
    min-height: 180px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 16px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.6;
    resize: vertical;
  }
  .resposta:focus { outline: none; border-color: var(--blue); }
  .resposta::placeholder { color: var(--muted); font-style: italic; }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { background: #222a33; }
  .btn-primary {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
  }
  .btn-primary:hover { background: #2563eb; }
  .save-status {
    font-size: 12px;
    color: var(--muted);
  }
  .save-status.ok { color: var(--green); }

  /* Histórico */
  .historico { margin-top: 40px; }
  .historico h2 {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  .hist-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .hist-data {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .hist-pergunta {
    font-size: 13px;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .hist-resposta {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .hist-empty {
    color: var(--muted);
    font-style: italic;
    font-size: 13px;
    padding: 20px;
    text-align: center;
    background: var(--panel);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }
  footer {
    margin-top: 60px;
    color: var(--muted);
    font-size: 11px;
    text-align: center;
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <a class="back" href="./">← voltar pro Kanban</a>
    <h1>🪞 Mural de Reflexão</h1>
    <div class="sub">Pergunta do dia · responda aqui, salve, volte amanhã.</div>
  </header>

  <div class="pergunta" id="perguntaBox">
    <div class="pergunta-categoria" id="categoria">—</div>
    <div class="pergunta-texto" id="perguntaTexto">carregando pergunta de hoje…</div>
    <div class="pergunta-data" id="perguntaData">—</div>
  </div>

  <div class="resposta-wrap">
    <label class="resposta-label" for="resposta">✍️ Sua resposta</label>
    <textarea class="resposta" id="resposta" placeholder="Sem limite. Pode ser 1 linha ou 10 parágrafos. O importante é ser honesto."></textarea>
    <div class="actions">
      <button class="btn btn-primary" id="btnSalvar">💾 salvar resposta</button>
      <button class="btn" id="btnLimpar">🗑 limpar</button>
      <span class="save-status" id="saveStatus"></span>
    </div>
  </div>

  <div class="historico">
    <h2>📜 Últimas reflexões</h2>
    <div id="historicoBody"></div>
  </div>

  <footer>
    Mural de Reflexão · acionado todo dia às 21:00 Manaus pelo cron <code>[cron ce56]</code> ·
    <a href="./">Kanban</a>
  </footer>
</div>

<script>
// === Mural de Reflexão ===
// Estrutura: { data: 'YYYY-MM-DD', categoria, pergunta, resposta, savedAt }
// Persistência: localStorage (enquanto não temos backend)
// Geração da pergunta: virá do ce56 (futuro: fetch JSON). Por enquanto, banco local de perguntas + rotação por data.

const PERGUNTAS_BANCO = [
  // AÇÃO
  { cat: '🎯 Ação', q: 'Qual é a 1 coisa que, se não for feita até sexta, trava tudo na próxima semana?' },
  { cat: '🎯 Ação', q: 'O que você tá empurrando com a barriga há 3 dias que precisa de 25 minutos focados hoje?' },
  { cat: '🎯 Ação', q: 'Quem é a 1 pessoa que, se você mandasse 1 mensagem agora, destravaria algo importante?' },
  { cat: '🎯 Ação', q: 'Qual decisão pequena você pode tomar AGORA em vez de pesquisar mais 1 hora?' },
  { cat: '🎯 Ação', q: 'Se você tivesse só 1h hoje pra avançar 1 projeto, qual escolheria? O que te impede?' },
  { cat: '🎯 Ação', q: 'O que você pode DELETAR hoje (recurso, compromisso, projeto) que tá tomando energia sem retorno?' },
  // VISÃO
  { cat: '🧠 Visão', q: 'Se daqui 1 ano nada mudasse na sua rotina, qual parte te incomodaria mais? O que isso diz sobre o que importa?' },
  { cat: '🧠 Visão', q: 'Você tá construindo um negócio ou um arquivo de ideias? O que falta pro segundo virar o primeiro?' },
  { cat: '🧠 Visão', q: 'O medo de quê exatamente te faz abandonar projetos no meio? Nomeia. Talvez ele não seja real.' },
  { cat: '🧠 Visão', q: 'Se um cliente te pagasse R$5000/mês amanhã por 1 insight diário, qual dos seus projetos atuais ele escolheria?' },
  { cat: '🧠 Visão', q: 'Qual história você conta sobre si mesmo quando trava? Ela é verdade ou é padrão?' },
  { cat: '🧠 Visão', q: 'Você quer ser Product Manager ou quer ser Product Owner? A diferença muda sua rota.' },
  { cat: '🧠 Visão', q: 'Daqui 5 anos, qual decisão de carreira você vai se arrepender de NÃO ter tomado?' },
  // MOMENTUM
  { cat: '⚡ Momentum', q: 'O que te deu energia essa semana? Como você pode repetir amanhã sem depender de ninguém?' },
  { cat: '⚡ Momentum', q: 'Qual ideia sua, mesmo maluca, tá te chamando atenção faz tempo? O 1º passo de 5 min seria…' },
  { cat: '⚡ Momentum', q: 'Você tem 25 min livres AGORA. O que você faria se não pudesse procrastinar?' },
  { cat: '⚡ Momentum', q: 'Qual conversa de 10 min com alguém mudaria sua semana? Manda a mensagem agora.' },
  { cat: '⚡ Momentum', q: 'Qual micro-SaaS óbvio você ainda não começou porque acha "simples demais pra dar certo"?' },
  { cat: '⚡ Momentum', q: 'O que aconteceria se você vendesse 1 ideia HOJE sem terminar ela? (sério)' },
  { cat: '⚡ Momentum', q: 'Seu app de violão tá esperando o quê? 1 função. 1 commit. Qual?' },
];

const STORAGE_KEY = 'mural_reflexao';
const HOJE_KEY = 'mural_pergunta_hoje';

// === JSONBIN (persistência nuvem) ===
// ⚠️ ATENÇÃO: Master Key está exposta no client. Free tier do JSONBin.io
//    não tem Access Keys escopadas (é Pro-only). Trade-off aceito pro MVP.
//    Se virar problema: revogue esta key na dashboard + gere nova.
const JSONBIN_BIN_ID = '6a28e774f5f4af5e29d5e565';
const JSONBIN_MASTER_KEY = '$2a$10$g6jrm.ifugmyTO7nGzWKIue3Q4ypHTUTwrxhFciJF43NiplD8w9mG';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
const JSONBIN_HEADERS = {
  'Content-Type': 'application/json',
  'X-Master-Key': JSONBIN_MASTER_KEY
};

// Carrega mural do JSONBin (cloud) com fallback pro localStorage
async function loadFromBin() {
  try {
    const r = await fetch(JSONBIN_URL + '/latest', { headers: JSONBIN_HEADERS });
    if (!r.ok) throw new Error('http ' + r.status);
    const j = await r.json();
    return (j && j.record && j.record.reflexoes) || [];
  } catch (e) {
    console.warn('JSONBin load falhou, usando localStorage:', e.message);
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }
}

// Salva mural inteiro no JSONBin
async function saveToBin(reflexoes) {
  const r = await fetch(JSONBIN_URL, {
    method: 'PUT',
    headers: JSONBIN_HEADERS,
    body: JSON.stringify({ reflexoes, metadata: { owner: 'Renato', updated: new Date().toISOString() } })
  });
  if (!r.ok) throw new Error('http ' + r.status);
  return await r.json();
}

// Gera pergunta do dia: estável pela data
function perguntaDoDia() {
  const hoje = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Manaus' }); // YYYY-MM-DD
  const cached = localStorage.getItem(HOJE_KEY);
  if (cached) {
    const c = JSON.parse(cached);
    if (c.data === hoje) return c;
  }
  // Rotação determinística por dia (seed = YYYYMMDD)
  const seed = parseInt(hoje.replace(/-/g, ''), 10);
  const idx = seed % PERGUNTAS_BANCO.length;
  const p = { data: hoje, ...PERGUNTAS_BANCO[idx] };
  localStorage.setItem(HOJE_KEY, JSON.stringify(p));
  return p;
}

function renderPergunta() {
  const p = perguntaDoDia();
  document.getElementById('categoria').textContent = p.cat;
  document.getElementById('perguntaTexto').textContent = p.q;
  const dt = new Date(p.data + 'T00:00:00');
  document.getElementById('perguntaData').textContent = dt.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'America/Manaus' });
}

// cache local do mural (carregado do bin uma vez, atualizado a cada save)
let MURAL_CACHE = null;

async function getReflexoes() {
  if (MURAL_CACHE === null) {
    MURAL_CACHE = await loadFromBin();
  }
  return MURAL_CACHE;
}

function getRespostaHoje() {
  const p = perguntaDoDia();
  const all = MURAL_CACHE || JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  return all.find(r => r.data === p.data);
}

async function setRespostaHoje(texto) {
  const p = perguntaDoDia();
  const all = (MURAL_CACHE || JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')).slice();
  const idx = all.findIndex(r => r.data === p.data);
  const entry = { data: p.data, categoria: p.cat, pergunta: p.q, resposta: texto, savedAt: new Date().toISOString() };
  if (idx >= 0) all[idx] = entry;
  else all.unshift(entry);
  // 1. salva local (rápido, offline-first)
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  MURAL_CACHE = all;
  // 2. sincroniza com a nuvem (best-effort)
  try {
    await saveToBin(all);
    return { ok: true };
  } catch (e) {
    console.warn('Sync bin falhou:', e.message);
    return { ok: false, error: e.message };
  }
}

function renderResposta() {
  const r = getRespostaHoje();
  document.getElementById('resposta').value = r ? r.resposta : '';
  if (r) {
    document.getElementById('saveStatus').textContent = '✓ resposta salva às ' + new Date(r.savedAt).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('saveStatus').className = 'save-status ok';
  } else {
    document.getElementById('saveStatus').textContent = '';
  }
}

function renderHistorico() {
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').slice(0, 7);
  const body = document.getElementById('historicoBody');
  if (!all.length) {
    body.innerHTML = '<div class="hist-empty">Nenhuma reflexão salva ainda. Responda acima e clique em salvar.</div>';
    return;
  }
  body.innerHTML = all.map(r => {
    const dt = new Date(r.data + 'T00:00:00');
    const dtStr = dt.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    const safe = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<div class="hist-item">
      <div class="hist-data">${dtStr} · ${r.categoria || ''}</div>
      <div class="hist-pergunta">${safe(r.pergunta || '')}</div>
      <div class="hist-resposta">${safe(r.resposta || '(sem resposta)')}</div>
    </div>`;
  }).join('');
}

document.getElementById('btnSalvar').addEventListener('click', async () => {
  const texto = document.getElementById('resposta').value.trim();
  const status = document.getElementById('saveStatus');
  if (!texto) {
    status.textContent = '⚠️ escreva algo antes de salvar';
    return;
  }
  status.textContent = '⏳ salvando…';
  const btn = document.getElementById('btnSalvar');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ salvando…';
  const res = await setRespostaHoje(texto);
  renderResposta();
  renderHistorico();
  if (res.ok) {
    btn.textContent = '✓ salvo na nuvem!';
    status.className = 'save-status ok';
  } else {
    btn.textContent = '⚠️ salvo local';
    status.textContent = 'salvo local; sync falhou: ' + res.error;
    status.className = 'save-status';
  }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
});

document.getElementById('btnLimpar').addEventListener('click', async () => {
  if (confirm('Limpar a resposta de HOJE? (histórico permanece)')) {
    document.getElementById('resposta').value = '';
    await setRespostaHoje('');
    renderResposta();
    renderHistorico();
  }
});

// Auto-save enquanto digita (debounce 1s)
let autoSaveTimer;
document.getElementById('resposta').addEventListener('input', () => {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(async () => {
    const texto = document.getElementById('resposta').value.trim();
    if (texto) {
      const res = await setRespostaHoje(texto);
      const status = document.getElementById('saveStatus');
      if (res.ok) {
        status.textContent = '✓ auto-salvo na nuvem';
        status.className = 'save-status ok';
      } else {
        status.textContent = '⚠️ auto-salvo local; sync falhou';
        status.className = 'save-status';
      }
    }
  }, 1000);
});

// inicializa: carrega do bin, depois renderiza
(async () => {
  MURAL_CACHE = await loadFromBin();
  // popula localStorage como cache offline
  localStorage.setItem(STORAGE_KEY, JSON.stringify(MURAL_CACHE));
  renderPergunta();
  renderResposta();
  renderHistorico();
})();
</script>
</body>
</html>
