            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));

            margin: 0 auto;

        .card {

            border-color: #58a6ff;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #f0f6fc;
        }
        .badge {

            color: #fff;

            font-size: 0.8em;

        }

        .badge.app { background: #238636; }
        .badge.negocio { background: #1f6feb; }
        .badge.github { background: #f0883e; }
        .card-desc {
            color: #8b949e;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.95em;
        }
        .card-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #8b949e;
            font-size: 0.85em;
        }
        .meta-item .icon {
            font-size: 1.1em;
        }
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tag {
            background: #21262d;
            color: #8b949e;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
        }
        .source {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #30363d;
            font-size: 0.85em;
            color: #8b949e;
        }
        .source-icon {
            width: 16px;
            height: 16px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .stats {

    </style>
</head>

        function createCard(item) {
            const isGitHub = item.fonte === 'GitHub Trending';
            const badgeClass = isGitHub ? 'github' : item.categoria;
            const starsDisplay = item.stars > 0 ? `<span class="meta-item"><span class="icon">⭐</span> ${item.stars.toLocaleString()}</span>` : '';
            const forksDisplay = item.forks > 0 ? `<span class="meta-item"><span class="icon">🍴</span> ${item.forks.toLocaleString()}</span>` : '';
            
            return `
                <div class="card" data-categoria="${item.categoria}" data-fonte="${item.fonte}">
                    <div class="card-header">
                        <span class="card-title">${item.titulo}</span>
                        <span class="badge ${badgeClass}">${item.badge}</span>
                    </div>
                    <p class="card-desc">${item.descricao}</p>
                    <div class="card-meta">
                        ${starsDisplay}
                        ${forksDisplay}
                    </div>
                    <div class="tags">
                        ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>

            `;
        }

        function renderCards(filter = 'all') {
            const grid = document.getElementById('opportunities');
            const filtered = filter === 'all' 
                ? dados 
                : filter === 'github'
                    ? dados.filter(d => d.fonte === 'GitHub Trending')
                    : dados.filter(d => d.categoria === filter);
            
            grid.innerHTML = filtered.map(createCard).join('');
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCards(btn.dataset.filter);
            });
        });

        // Initial render
        renderCards();
