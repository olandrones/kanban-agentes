<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="60" />
<title>🤖 Kanban dos Agentes</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1a1f26;
    --border: #232a32;
    --text: #e6e8eb;
    --muted: #8a94a0;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  header {
    max-width: 1400px;
    margin: 0 auto 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 { font-size: 22px; font-weight: 600; }
  .meta { color: var(--muted); font-size: 13px; font-family: ui-monospace, "Cascadia Code", monospace; }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #222a33; }
  .board {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color .2s;
  }
  .card:hover { border-color: #3a4452; }
  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .emoji { font-size: 24px; }
  .name { font-weight: 600; font-size: 15px; flex: 1; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .b-green { background: rgba(34,197,94,.15); color: var(--green); }
  .b-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
  .b-red { background: rgba(239,68,68,.15); color: var(--red); }
  .b-blue { background: rgba(59,130,246,.15); color: var(--blue); }
  .row { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; }
  .label { color: var(--muted); min-width: 80px; flex-shrink: 0; }
  .value { color: var(--text); flex: 1; }
  .freq { color: var(--orange); font-family: ui-monospace, monospace; font-size: 12px; }
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .stat {
    background: var(--panel-2);
    padding: 8px 10px;
    border-radius: 6px;
    text-align: center;
  }
  .stat-num { font-size: 18px; font-weight: 600; color: var(--blue); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .progress {
    height: 4px;
    background: var(--panel-2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress > div { height: 100%; background: var(--blue); transition: width .3s; }
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    background: var(--panel-2);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .link:hover { color: var(--blue); }
  footer {
    max-width: 1400px;
    margin: 24px auto 0;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .legend {
    display: inline-flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-left: 12px;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

    <div class="meta" id="meta">— carregando —</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <span class="legend">
      <span class="legend-item"><span class="dot" style="background:var(--green)"></span> ativo</span>
      <span class="legend-item"><span class="dot" style="background:var(--yellow)"></span> em curso</span>
      <span class="legend-item"><span class="dot" style="background:var(--red)"></span> bloqueado</span>
      <span class="legend-item"><span class="dot" style="background:var(--blue)"></span> sempre on</span>

</header>

<div class="board" id="board"></div>

<footer>
